name: Quality checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-quality:
    name: Bash and ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Validate Bash syntax
        run: bash -n config.sh install.sh restore.sh uninstall.sh tests/*.sh

      - name: Run ShellCheck
        run: shellcheck -x config.sh install.sh restore.sh uninstall.sh tests/*.sh

      - name: Run regression test
        run: ./tests/regression.sh
